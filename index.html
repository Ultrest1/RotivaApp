<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rotiva — Yasal & Destek</title>
<style>
  :root { --orange: #FF6B2C; --bg: #0E0F12; --surface: #1A1C20; --text: #F4F4F5; --muted: #A1A1AA; }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; -webkit-font-smoothing: antialiased; }
  .wrap { max-width: 720px; margin: 0 auto; padding: 48px 22px 64px; }
  .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .brand .dot { width: 38px; height: 38px; border-radius: 11px; background: var(--orange); display: flex; align-items: center; justify-content: center; font-size: 20px; }
  .brand h1 { font-size: 22px; margin: 0; letter-spacing: 0.5px; }
  p.lead { color: var(--muted); margin: 0 0 36px; }
  .cards { display: grid; gap: 14px; }
  a.card { display: block; text-decoration: none; color: var(--text); background: var(--surface); border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; padding: 20px; transition: border-color .2s; }
  a.card:hover { border-color: var(--orange); }
  a.card h2 { margin: 0 0 4px; font-size: 17px; color: var(--orange); }
  a.card span { color: var(--muted); font-size: 14px; }
  footer { margin-top: 40px; color: var(--muted); font-size: 13px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="brand"><div class="dot">🏃</div><h1>Rotiva</h1></div>
    <p class="lead">Koşu & yürüyüş takibi. Yasal belgeler ve destek.</p>
    <div class="cards">
      <a class="card" href="privacy.html"><h2>Gizlilik Politikası</h2><span>Hangi verileri işliyoruz ve nasıl koruyoruz</span></a>
      <a class="card" href="terms.html"><h2>Kullanım Koşulları</h2><span>Abonelik, deneme süresi ve hizmet şartları</span></a>
      <a class="card" href="support.html"><h2>Destek</h2><span>Sık sorulanlar ve bize ulaşma</span></a>
    </div>
    <footer>© 2026 Rotiva. Tüm hakları saklıdır.</footer>
  </div>
</body>
</html>
